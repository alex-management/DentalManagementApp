[build]
    command = "npm install && npm run build"
  publish = "dist"
  base = "/"
  ignore = "false"  # Never skip build
  force = "true"    # Force build even if no changes detected

[build.environment]
  NODE_VERSION = "18"
  CI = "true"       # Ensure we're in CI mode
  NETLIFY_BUILD_SKIP = "false"  # Never skip build
  # Allow the scanner to ignore Supabase public client-side values that are
  # intentionally embedded in the Vite client bundle. SUPABASE_URL and
  # SUPABASE_KEY share the same values as their VITE_* counterparts and must
  # also be listed here to prevent false-positive secret detections.
  # Do NOT put private/service-role keys here.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL,SUPABASE_URL,SUPABASE_KEY"

[build.processing]
  skip_processing = false  # Ensure processing is not skipped

[dev]
  command = "vite"
  port = 3000
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true