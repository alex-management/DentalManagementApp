[build]
    command = "npm install && npm run build"
  publish = "dist"
  base = "/"
  ignore = "false"  # Never skip build
  force = "true"    # Force build even if no changes detected

[build.environment]
  NODE_VERSION = "18"
  CI = "true"
  NETLIFY_BUILD_SKIP = "false"
  # Allow the scanner to ignore these keys whose values are intentionally
  # embedded in the client bundle by Vite (public Supabase anon key + URL).
  # SUPABASE_KEY and SUPABASE_URL hold the same values as their VITE_ counterparts
  # and must also be omitted to avoid false-positive detections.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL,SUPABASE_KEY,SUPABASE_URL"

[build.processing]
  skip_processing = false  # Ensure processing is not skipped

[dev]
  command = "vite"
  port = 3000
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true